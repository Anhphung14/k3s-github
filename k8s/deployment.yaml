apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-app
          image: localhost:5000/web-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9000
          env:
            - name: APP_ENV
              value: "production"
            # Add other environment variables (e.g., DB_HOST, DB_PASSWORD) here
