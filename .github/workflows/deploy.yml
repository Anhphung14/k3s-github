name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t localhost:5000/web-app:latest .

      - name: Push to Local Registry
        run: |
          docker push localhost:5000/web-app:latest

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Restart K3s Deployment
        run: |
          kubectl rollout restart deployment web-app-deployment
          kubectl rollout status deployment web-app-deployment
